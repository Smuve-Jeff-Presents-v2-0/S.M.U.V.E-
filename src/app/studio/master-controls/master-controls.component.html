<div class="master-bus-dsp h-full flex items-center justify-between px-4 gap-8">
  <!-- Section 1: Label & Branding -->
  <div class="flex flex-col min-w-[120px]">
    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-emerald-500 italic">Master Bus DSP</h3>
    <div class="text-[8px] text-slate-500 font-mono uppercase tracking-tighter">Signal Processor v3.0</div>
  </div>

  <div class="h-8 w-px bg-white/5"></div>

  <!-- Section 2: Global Gain Controls -->
  <div class="flex items-center gap-10">
    <div class="control-group flex flex-col gap-1">
      <div class="flex justify-between items-center mb-1">
        <label class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Master Volume</label>
        <span class="text-[8px] font-mono text-emerald-500/80">{{ masterVolumePercent() }}%</span>
      </div>
      <div class="fader-track w-32 h-1 bg-slate-900 rounded-full relative overflow-hidden">
        <input type="range" min="0" max="1" step="0.01" [value]="masterVolume()"
               (input)="updateMasterVolume($event)"
               class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
        <div class="fader-fill h-full bg-gradient-to-r from-emerald-600 to-emerald-400 rounded-full" [style.width.%]="masterVolumePercent()"></div>
      </div>
    </div>

    <div class="control-group flex flex-col gap-1">
       <div class="flex justify-between items-center mb-1">
        <label class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Global Ambience</label>
        <span class="text-[8px] font-mono text-emerald-500/80">{{ reverbMixPercent() }}%</span>
      </div>
      <div class="fader-track w-32 h-1 bg-slate-900 rounded-full relative overflow-hidden">
        <input type="range" min="0" max="1" step="0.01" [value]="reverbMix()"
               (input)="updateReverb($event)"
               class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
        <div class="fader-fill h-full bg-gradient-to-r from-emerald-600 to-emerald-400 rounded-full" [style.width.%]="reverbMixPercent()"></div>
      </div>
    </div>
  </div>

  <div class="h-8 w-px bg-white/5"></div>

  <!-- Section 3: DSP Processors -->
  <div class="flex items-center gap-3">
    <button (click)="toggleLimiter()"
            [class.active]="isLimiterActive()"
            class="dsp-toggle-btn group"
            title="Toggle Precision Limiter">
      <div class="flex flex-col items-center gap-1">
        <i class="fas fa-microchip text-[10px]"></i>
        <span class="text-[7px] font-black uppercase tracking-tighter">Limiter</span>
      </div>
      <div class="status-dot" [class.on]="isLimiterActive()"></div>
    </button>

    <button (click)="toggleSoftClip()"
            [class.active]="isSoftClipActive()"
            class="dsp-toggle-btn group"
            title="Toggle Soft Clipping">
      <div class="flex flex-col items-center gap-1">
        <i class="fas fa-wave-square text-[10px]"></i>
        <span class="text-[7px] font-black uppercase tracking-tighter">Soft Clip</span>
      </div>
      <div class="status-dot" [class.on]="isSoftClipActive()"></div>
    </button>
  </div>

  <div class="h-8 w-px bg-white/5"></div>

  <!-- Section 4: Monitoring -->
  <div class="flex items-center gap-4">
    <div class="flex flex-col items-center">
      <span class="text-[7px] font-bold text-slate-600 uppercase mb-2 tracking-widest">Gain Reduction</span>
      <app-gain-reduction-meter [compressor]="compressor"></app-gain-reduction-meter>
    </div>
  </div>

  <div class="h-8 w-px bg-white/5"></div>

  <!-- Section 5: Session & Export -->
  <div class="flex items-center gap-4 ml-auto">
    <button (click)="toggleRecording()"
            [class.recording]="isRecording()"
            class="rec-btn flex items-center gap-3 px-4 py-2 rounded-xl border border-white/5 bg-slate-900 transition-all">
      <div class="w-2 h-2 rounded-full" [class.bg-red-500]="isRecording()" [class.bg-slate-700]="!isRecording()" [class.animate-pulse]="isRecording()"></div>
      <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">
        {{ isRecording() ? 'STOP RECORDING' : 'REC MASTER' }}
      </span>
    </button>

    <button (click)="finishTrack()"
            [disabled]="isFinishing()"
            class="finish-btn group relative overflow-hidden px-8 py-2 rounded-xl bg-emerald-500 text-black font-black text-[10px] uppercase tracking-widest hover:bg-emerald-400 transition-all disabled:opacity-50">
      <div class="flex items-center justify-center gap-2">
        <i class="fas" [ngClass]="{'fa-paper-plane': !isFinishing(), 'fa-spinner fa-spin': isFinishing()}"></i>
        <span>{{ isFinishing() ? 'FINALIZING...' : 'FINISH TRACK' }}</span>
      </div>
    </button>
  </div>
</div>
