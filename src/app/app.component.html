<div
  class="app-container"
  [attr.data-theme]="uiService.activeTheme().name"
  [ngClass]="'theme-' + uiService.activeTheme().primary"
>
  <div class="main-background"></div>

  <app-notification-toast></app-notification-toast>

  <!-- Navigation Header -->
  <header class="app-header">
    <div class="nav-group">
      <div class="logo-container" routerLink="/hub">
        <div class="logo-icon">
          <i class="fas fa-microchip"></i>
        </div>
        <div class="logo-text">
          <span class="brand">S.M.U.V.E</span>
          <span class="version">3.0</span>
        </div>
      </div>

      <nav class="main-nav">
        <a routerLink="/profile" routerLinkActive="active" class="nav-item">
          <i class="fas fa-user-circle"></i>
          <span>Artist Profile</span>
        </a>
        <a routerLink="/hub" routerLinkActive="active" class="nav-item">
          <i class="fas fa-th-large"></i>
          <span>Hub</span>
        </a>
        <a routerLink="/studio" routerLinkActive="active" class="nav-item">
          <i class="fas fa-music"></i>
          <span>Studio</span>
        </a>
        <a routerLink="/practice" routerLinkActive="active" class="nav-item">
          <i class="fas fa-microphone-alt"></i>
          <span>Practice</span>
        </a>
      </nav>
    </div>

    <div class="header-center">
      <div class="view-mode-selector">
        <button
          (click)="uiService.toggleMainViewMode()"
          class="mode-button"
          title="Switch View"
        >
          <span class="mode-text">{{ uiService.mainViewMode() }}</span>
          <i class="fas fa-bolt"></i>
        </button>
      </div>

      <div class="divider"></div>

      <div class="flex items-center gap-2">
        <button
          (click)="uiService.randomizeTheme()"
          class="utility-button"
          title="Appearance"
          aria-label="Randomize Application Theme"
        >
          <i class="fas fa-palette"></i>
        </button>
        <button
          (click)="uiService.showEqPanel.set(!uiService.showEqPanel())"
          class="utility-button"
          [class.active]="uiService.showEqPanel()"
          title="Equalizer"
          aria-label="Toggle Equalizer Panel"
        >
          <i class="fas fa-sliders-h"></i>
        </button>
      </div>
    </div>

    <div class="flex items-center gap-6">
      <div class="status-indicator" [class.offline]="!uiService.isOnline()">
        <div class="status-dot"></div>
        <span class="status-text">{{ uiService.isOnline() ? 'Online' : 'Offline' }}</span>
      </div>

      <button
        (click)="toggleChatbot()"
        class="utility-button"
        [class.active]="uiService.isChatbotOpen()"
        title="AI Assistant"
        aria-label="Toggle S.M.U.V.E AI Assistant"
      >
        <i class="fas fa-comment-alt"></i>
      </button>

      <div class="divider"></div>

      <button
        *ngIf="!authService.isAuthenticated()"
        routerLink="/hub"
        class="cta-button"
        aria-label="Get Started"
      >
        GET STARTED
      </button>

      <div
        *ngIf="authService.isAuthenticated()"
        class="flex items-center gap-4"
      >
        <div class="flex flex-col items-end">
          <span class="text-xs font-semibold text-white">{{
            authService.currentUser()?.artistName
          }}</span>
          <span class="text-[10px] text-emerald-400 font-medium uppercase tracking-tighter"
            >Verified</span
          >
        </div>
        <div class="avatar-container">
          <img
            src="assets/avatar.jpg"
            alt="Avatar"
            class="avatar-image"
          />
        </div>
        <button
          (click)="authService.logout()"
          class="logout-button"
          title="Logout"
          aria-label="Logout"
        >
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Content Area -->
  <main class="app-main">
    <div class="content-wrapper custom-scrollbar">
      <router-outlet></router-outlet>
    </div>

    <!-- Chatbot Sidebar -->
    <aside
      *ngIf="uiService.isChatbotOpen()"
      class="chatbot-drawer animate__animated animate__slideInRight"
    >
      <app-chatbot
        (close)="uiService.toggleChatbot()"
        [theme]="uiService.activeTheme()"
        [mainViewMode]="uiService.mainViewMode()"
      ></app-chatbot>
    </aside>
  </main>

  <footer class="app-footer">
    <div class="footer-content">
      <span>S.M.U.V.E 3.0</span>
      <span class="dot"></span>
      <span>Smuve Jeff Presents</span>
      <span class="dot"></span>
      <span>Modern AI Interface</span>
    </div>
  </footer>
</div>
