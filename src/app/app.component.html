
<div class="app-container" [attr.data-theme]="uiService.activeTheme().name" [class.sidebar-closed]="!isSidebarOpen()" [class.is-mobile]="isMobile()">
  <app-notification-toast></app-notification-toast>
  <app-smuve-advisor></app-smuve-advisor>

  <aside class="app-sidebar" [class.open]="isSidebarOpen()">
    <div class="sidebar-header" (click)="navigateToView('hub')">
      <div class="logo-icon"><i class="fas fa-microchip"></i></div>
      <div class="logo-text"><span>S.M.U.V.E</span></div>
    </div>
    <nav class="sidebar-nav">
       <a *ngFor="let view of uiService.getViewConfigs()" (click)="navigateToView(view.mode)" class="nav-item" [class.active]="uiService.mainViewMode() === view.mode">
         <i class="fas {{view.icon}}"></i>
         <span *ngIf="isSidebarOpen() || isMobile()">{{view.label}}</span>
       </a>
    </nav>
  </aside>

  <header class="app-top-bar">
    <div class="header-left">
      <button *ngIf="isMobile()" (click)="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h2 class="ml-4">{{ uiService.mainViewMode() | uppercase }}</h2>
    </div>
    <div class="header-right">
       <button *ngIf="!authService.isAuthenticated()" routerLink="/login" class="bg-emerald-500 text-black px-4 py-1 rounded">LOGIN</button>
       <div *ngIf="authService.isAuthenticated()" class="flex items-center gap-2">
          <img src="assets/avatar.jpg" class="w-8 h-8 rounded-full">
          <button (click)="authService.logout()"><i class="fas fa-power-off"></i></button>
       </div>
    </div>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
    <aside *ngIf="uiService.isChatbotOpen()" class="ai-drawer">
      <app-chatbot (close)="uiService.toggleChatbot()"></app-chatbot>
    </aside>
  </main>
</div>
